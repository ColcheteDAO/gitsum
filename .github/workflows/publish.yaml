name: Build and Publish to GHCR

on:
  push:
    branches:
      - main
    # Optional: Also trigger on version tags (e.g., v1.0.0)
    tags:
      - 'v*.*.*'

# Define environment variables
env:
  REGISTRY: ghcr.io
  # github.repository is usually "username/repo"
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # CRITICAL: We need write permissions to push to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup Docker Buildx (Required for advanced caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Login to GitHub Container Registry
      # The GITHUB_TOKEN is automatically provided by Actions; no manual secrets needed.
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Extract metadata (tags, labels) for Docker
      # This handles lowercasing the repo name and applying tags (latest, sha, etc.)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      # 4. Build and Push with GHA Caching
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # THE MAGIC HAPPENS HERE:
          # Pull the cache from the GitHub Actions cache backend
          cache-from: type=gha
          # Push the new cache to the backend. 
          # mode=max ensures intermediate stages (like the Cargo Chef builder) are cached!
          cache-to: type=gha,mode=max
