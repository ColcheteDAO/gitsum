<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitsum Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --border: #334155;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        h1 { margin: 0; font-size: 1.8rem; }
        .global-status { padding: 0.5rem 1rem; border-radius: 999px; font-weight: bold; font-size: 0.9rem; }
        .status-synced { background-color: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-desynced { background-color: rgba(239, 68, 68, 0.2); color: var(--error); }
        .project-card { background: var(--card-bg); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .project-name { font-size: 1.4rem; font-weight: bold; margin: 0; }
        .remote-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        .remote-card { background: var(--bg-color); padding: 1rem; border-radius: 6px; border: 1px solid var(--border); }
        .remote-name { font-weight: bold; margin-bottom: 0.5rem; color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; }
        .hash-badge { display: inline-block; font-family: monospace; background: var(--card-bg); padding: 0.2rem 0.5rem; border-radius: 4px; border: 1px solid var(--border); }
        .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 0.5rem; }
        .timestamp { font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gitsum Monitor</h1>
            <div id="global-status" class="global-status">Loading...</div>
        </header>
        <main id="projects-container">
            <p style="text-align: center; color: var(--text-muted);">Fetching sync status...</p>
        </main>
        <div id="last-updated" class="timestamp"></div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/v1/status');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error("Failed to fetch status:", error);
                document.getElementById('global-status').textContent = "Connection Error";
                document.getElementById('global-status').className = "global-status status-desynced";
            }
        }

        function renderDashboard(data) {
            // Update Global Status
            const globalBadge = document.getElementById('global-status');
            globalBadge.textContent = data.global_sync ? "SYSTEM SYNCED" : "OUT OF SYNC";
            globalBadge.className = `global-status ${data.global_sync ? 'status-synced' : 'status-desynced'}`;

            // Render Projects
            const container = document.getElementById('projects-container');
            container.innerHTML = '';

            data.projects.forEach(project => {
                const projectEl = document.createElement('div');
                projectEl.className = 'project-card';
                
                let remotesHtml = project.remotes.map(remote => `
                    <div class="remote-card">
                        <div class="remote-name">${remote.remote_name}</div>
                        ${remote.hash ? `<div class="hash-badge">${remote.hash}</div>` : ''}
                        ${remote.error_msg ? `<div class="error-msg">⚠️ ${remote.error_msg}</div>` : ''}
                    </div>
                `).join('');

                projectEl.innerHTML = `
                    <div class="project-header">
                        <h2 class="project-name">${project.project_name}</h2>
                        <span style="color: ${project.is_synced ? 'var(--success)' : 'var(--error)'}">
                            ● ${project.is_synced ? 'Synced' : 'Desynced'}
                        </span>
                    </div>
                    <div class="remote-grid">
                        ${remotesHtml}
                    </div>
                `;
                container.appendChild(projectEl);
            });

            document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        }

        // Fetch immediately, then every 10 seconds
        fetchStatus();
        setInterval(fetchStatus, 10000);
    </script>
</body>
</html>
